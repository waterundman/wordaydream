<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Poppins:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style id="theme-vars">
:root {
  --primary: #d97757;
  --primary-foreground: #faf9f5;
  --text-50: #1b1b19;
  --text-100: #2c2c2b;
  --text-200: #46443b;
  --text-300: #6e6d68;
  --text-400: #908e84;
  --text-500: #b7b5a9;
  --text-900: #faf9f5;
  --bg-900: #faf9f5;
  --brand-500: #d97757;
  --surface-base: #faf9f5;
  --surface-elevated: #ffffff;
  --surface-subtle: #f5f4ee;
  --border-700: #d8d6cd;
  --border-800: #b7b5a9;
  --destructive: #ef4444;
  --font-display: "Newsreader", Georgia, ui-serif, serif;
  --font-sans: "Poppins", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Lora", Georgia, ui-serif, serif;
  --font-mono: "Geist Mono", ui-monospace, monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
}
@theme inline {
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-destructive: var(--destructive);
  --color-background: var(--surface-base);
  --color-foreground: var(--text-50);
  --color-card: var(--surface-elevated);
  --color-card-foreground: var(--text-50);
  --color-muted: var(--surface-subtle);
  --color-muted-foreground: var(--text-400);
  --color-border: var(--border-700);
  --color-input: var(--border-700);
  --color-ring: var(--brand-500);
  --font-display: var(--font-display);
  --font-sans: var(--font-sans);
  --font-serif: var(--font-serif);
  --font-mono: var(--font-mono);
  --radius-sm: var(--radius-sm);
  --radius-md: var(--radius-md);
  --radius-lg: var(--radius-lg);
  --radius-xl: var(--radius-xl);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--surface-base); color: var(--text-50); font-family: var(--font-sans); text-wrap: pretty; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
    }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="max-w-[960px] mx-auto px-6 py-8 sm:py-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-5">
            <span class="text-xl font-medium tracking-tight" style="font-family: var(--font-display); color: var(--text-50);">Wordaydream</span>
            <div class="flex items-center gap-3">
                <!-- Streak badge -->
                <div class="inline-flex items-center gap-1.5 h-9 px-3 rounded-full" style="background: var(--surface-subtle); border: 1px solid var(--border-700);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
                    </svg>
                    <span class="text-sm font-semibold" style="color: var(--text-50);">1</span>
                </div>
                <!-- Settings button -->
                <button data-dom-id="open-settings" type="button" aria-label="设置"
                    class="w-11 h-11 rounded-full flex items-center justify-center border border-[var(--border-700)] hover:border-[var(--border-800)] transition-colors"
                    style="color: var(--text-200);">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Hero Card -->
        <section class="rounded-2xl p-6 sm:p-8 mb-5 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
                <div class="flex-1 min-w-0">
                    <h2 class="text-3xl font-medium mb-6" style="font-family: var(--font-display); color: var(--text-50); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">在语境中学习词汇</h2>
                    <button data-dom-id="start-reading" type="button"
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-full font-medium text-sm bg-[var(--text-50)] hover:bg-[var(--text-100)] transition-colors"
                        style="color: var(--text-900);">
                        开始阅读
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12h14M13 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
                <!-- Progress ring -->
                <div class="shrink-0 mx-auto sm:mx-0">
                    <svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="今日进度 0/8">
                        <circle cx="70" cy="70" r="60" fill="none" stroke="var(--border-700)" stroke-width="8"/>
                        <circle cx="70" cy="70" r="60" fill="none" stroke="var(--primary)" stroke-width="8" stroke-dasharray="376.99" stroke-dashoffset="376.99" stroke-linecap="round" transform="rotate(-90 70 70)"/>
                        <text x="70" y="77" text-anchor="middle" font-size="22" font-weight="600" style="font-family: var(--font-sans); fill: var(--text-50);">0/8</text>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Recommendation Card -->
        <section class="rounded-2xl p-5 mb-5 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="font-semibold whitespace-nowrap truncate" style="color: var(--text-50);">英语 · L2</span>
                    <span class="shrink-0" style="color: var(--text-400);">·</span>
                    <span class="whitespace-nowrap truncate" style="color: var(--text-400);">8 min · 8 words</span>
                </div>
                <button type="button"
                    class="shrink-0 px-5 py-2 rounded-full font-medium text-sm border border-[var(--border-700)] hover:border-[var(--border-800)] transition-colors"
                    style="color: var(--primary);">
                    继续
                </button>
            </div>
        </section>

        <!-- Achievement Wall -->
        <section class="mb-5">
            <h3 class="text-xl font-medium mb-4" style="font-family: var(--font-display); color: var(--text-50);">成就</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <!-- Badge 1: Unlocked -->
                <div class="rounded-2xl p-4 flex flex-col items-center gap-3 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)] hover:border-[var(--border-800)] transition-colors">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--surface-subtle); color: var(--primary);">
                        <i data-lucide="book-open" class="w-5 h-5"></i>
                    </div>
                    <span class="text-sm font-medium text-center whitespace-nowrap" style="color: var(--text-50);">初次阅读</span>
                </div>
                <!-- Badge 2: Locked -->
                <div class="rounded-2xl p-4 flex flex-col items-center gap-3 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)]" style="opacity: 0.5;">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--surface-subtle); color: var(--text-400);">
                        <i data-lucide="flame" class="w-5 h-5"></i>
                    </div>
                    <span class="text-sm font-medium text-center whitespace-nowrap" style="color: var(--text-300);">连续7天</span>
                </div>
                <!-- Badge 3: Locked -->
                <div class="rounded-2xl p-4 flex flex-col items-center gap-3 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)]" style="opacity: 0.5;">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--surface-subtle); color: var(--text-400);">
                        <i data-lucide="book-marked" class="w-5 h-5"></i>
                    </div>
                    <span class="text-sm font-medium text-center whitespace-nowrap" style="color: var(--text-300);">词汇大师</span>
                </div>
                <!-- Badge 4: Locked -->
                <div class="rounded-2xl p-4 flex flex-col items-center gap-3 bg-[var(--surface-elevated)] border border-[var(--border-700)] shadow-[0_1px_3px_rgba(0,0,0,0.05)]" style="opacity: 0.5;">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--surface-subtle); color: var(--text-400);">
                        <i data-lucide="award" class="w-5 h-5"></i>
                    </div>
                    <span class="text-sm font-medium text-center whitespace-nowrap" style="color: var(--text-300);">阅读达人</span>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center pt-6 pb-2">
            <span class="text-sm" style="color: var(--text-400); font-family: var(--font-display);">Wordaydream</span>
        </footer>
    </main>
    <style>
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 4px;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
