# Wordaydream Nginx 配置
# 部署位置: /etc/nginx/sites-available/wordaydream
# 启用: ln -s /etc/nginx/sites-available/wordaydream /etc/nginx/sites-enabled/
#
# 把 your-domain.com 替换为你的实际域名
# 静态文件在 /var/www/wordaydream (dist/ 目录内容)
# LLM 代理在 localhost:3001 (PM2 管理的 Node.js 服务)

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/wordaydream;
    index index.html;

    # SPA 路由: 所有前端路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # LLM 代理: 转发到 Node.js 服务
    location /api/llm-proxy {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM 请求可能较慢, 超时设为 60s
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 静态资源长缓存 (文件名含 hash, 改动自动失效)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker 不缓存 (每次拉最新)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}

# HTTP -> HTTPS 重定向 (certbot 会自动添加, 这里预置)
# 运行 certbot --nginx -d your-domain.com 后会自动配置 HTTPS
